<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Login | Coupon Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --background: 240 10% 3.9%;
      --foreground: 0 0% 98%;
      --card: 240 10% 3.9%;
      --card-foreground: 0 0% 98%;
      --muted: 240 3.7% 15.9%;
      --muted-foreground: 240 5% 64.9%;
      --border: 240 3.7% 15.9%;
      --input: 240 3.7% 15.9%;
      --ring: 240 4.9% 83.9%;
      --radius: 0.75rem;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    .card {
      width: 100%;
      max-width: 24rem;
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      background: hsl(var(--card));
      padding: 1rem;
      box-shadow: 0 10px 32px hsl(0 0% 0% / 0.35);
    }

    .title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      letter-spacing: -0.02em;
    }

    .desc {
      font-size: 0.8125rem;
      color: hsl(var(--muted-foreground));
      margin-bottom: 1rem;
    }

    .field {
      margin-bottom: 0.75rem;
    }

    .label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      margin-bottom: 0.375rem;
    }

    .input {
      width: 100%;
      height: 2.5rem;
      border-radius: calc(var(--radius) - 2px);
      border: 1px solid hsl(var(--input));
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      font-size: 0.875rem;
      padding: 0 0.75rem;
      outline: none;
    }

    .input:focus {
      border-color: hsl(var(--ring));
      box-shadow: 0 0 0 2px hsl(var(--ring) / 0.15);
    }

    .btn {
      width: 100%;
      height: 2.5rem;
      border: 1px solid hsl(var(--foreground));
      border-radius: calc(var(--radius) - 2px);
      background: hsl(var(--foreground));
      color: hsl(var(--background));
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .message {
      margin-top: 0.75rem;
      font-size: 0.8125rem;
      min-height: 1.2rem;
      color: hsl(var(--muted-foreground));
    }

    .message.error {
      color: hsl(0 84% 67%);
    }
  </style>
</head>

<body>
  <main class="card">
    <h1 class="title">Sign in to Coupon Bot</h1>
    <p class="desc">Session expires daily at 12:00 AM server local time.</p>

    <form id="loginForm">
      <div class="field">
        <label class="label" for="email">Email</label>
        <input id="email" class="input" type="email" autocomplete="username" required />
      </div>
      <div class="field">
        <label class="label" for="password">Password</label>
        <input id="password" class="input" type="password" autocomplete="current-password" required />
      </div>
      <button id="loginBtn" class="btn" type="submit">Login</button>
      <p id="message" class="message"></p>
    </form>
  </main>

  <script>
    const loginForm = document.getElementById("loginForm");
    const loginBtn = document.getElementById("loginBtn");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const messageEl = document.getElementById("message");

    async function api(path, method = "GET", body) {
      const res = await fetch(path, {
        method,
        headers: { "content-type": "application/json" },
        body: body ? JSON.stringify(body) : undefined
      });
      const raw = await res.text();
      let payload = null;
      try {
        payload = raw ? JSON.parse(raw) : null;
      } catch (_) {
        payload = null;
      }
      if (!res.ok) {
        const msg = payload?.message || payload?.error || `Request failed (${res.status})`;
        throw new Error(msg);
      }
      return payload || {};
    }

    function showMessage(text, isError = false) {
      messageEl.textContent = text || "";
      messageEl.classList.toggle("error", Boolean(isError));
    }

    async function boot() {
      try {
        const status = await api("/api/auth/status");
        if (status?.authenticated) {
          window.location.replace("/");
        }
      } catch (_) {}
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      loginBtn.disabled = true;
      loginBtn.textContent = "Signing in...";
      showMessage("");
      try {
        await api("/api/auth/login", "POST", {
          email: emailInput.value.trim(),
          password: passwordInput.value
        });
        window.location.replace("/");
      } catch (error) {
        showMessage(error.message || "Login failed", true);
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
      }
    });

    boot();
  </script>
</body>

</html>
