services:
  - type: web
    name: whatsapp-coupon-bot
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: node src/control-server.js
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: whatsapp-coupon-auth
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: Asia/Kolkata
      - key: CONTROL_HOST
        value: 0.0.0.0
      - key: ALWAYS_CONNECTED_MODE
        value: "true"
      - key: MONITORING_ENABLED_ON_BOOT
        value: "false"
      - key: REQUIRE_CONTROL_AUTH
        value: "true"
      - key: HEALTH_RATE_LIMIT_MAX
        value: "30"
      - key: HEALTH_RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: AUTH_FAIL_RATE_LIMIT_MAX
        value: "20"
      - key: AUTH_FAIL_RATE_LIMIT_WINDOW_SECONDS
        value: "300"
      - key: RATE_LIMIT_MAX_KEYS
        value: "5000"
      - key: CONTROL_AUTH_EMAIL
        sync: false
      - key: CONTROL_AUTH_PASSWORD
        sync: false
      - key: CONTROL_SESSION_SECRET
        sync: false
      - key: SESSION_COOKIE_NAME
        value: coupon_bot_session
      - key: SESSION_SAMESITE
        value: Lax
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_MAX_ACTIVE
        value: "200"
      - key: AUTH_PATH
        value: /var/data/.wwebjs_auth
      - key: CLIENT_ID
        value: coupon-bot
      - key: HEADLESS
        value: "true"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
      - key: ALLOW_FROM_ME
        value: "false"
      - key: DEBUG_LOGS
        value: "false"
      - key: LOG_ALL_GROUP_MESSAGES
        value: "false"
      - key: QUIET_MODE
        value: "true"
      - key: DISABLE_TERMINAL_QR
        value: "true"
      - key: CONTROL_LOG_LIMIT
        value: "0"
      - key: BOT_MAX_OLD_SPACE_MB
        value: "160"
      - key: REPLY_COOLDOWN_SECONDS
        value: "0"
      - key: AUTO_RESTART_ON_DISCONNECT
        value: "true"
      - key: RESTART_DELAY_MS
        value: "5000"
      - key: TARGET_GROUP_IDS
        sync: false
      - key: TARGET_GROUP_NAMES
        sync: false
      - key: REPLY_MESSAGE
        sync: false
      - key: ALLOWED_MESS_NAMES
        value: neelkesh,firstman
      - key: ACTIVE_MEAL_MODE
        value: all
      - key: MESS_ALIASES_JSON
        value: '{"neelkesh":["neelksh","neelakesh"],"firstman":["fristman","firstmaan"]}'
